name: Docker Build

on:
  push:
    branches: [develop]
    tags: [v*]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Docker Meta Frontend
      id: docker_meta_frontend
      uses: crazy-max/ghaction-docker-meta@v1
      with:
        images: ghcr.io/ryanconnell/tracker-frontend
        tag-sha: true

    - name: Docker Meta Backend
      id: docker_meta_backend
      uses: crazy-max/ghaction-docker-meta@v1
      with:
        images: ghcr.io/ryanconnell/tracker-backend
        tag-sha: true

    - name: Setup Docker Cross Compilation
      uses: docker/setup-buildx-action@v1

    - name: Cache Docker Layers
      uses: actions/cache@v2
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Login to Github Docker registry
      uses: docker/login-action@v1
      with:
        username: RyanConnell
        password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        registry: ghcr.io

    - name: Build and Push Frontend
      uses: docker/build-push-action@v2
      with:
        file: cmd/frontend/Dockerfile
        platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64
        push: true
        tags: ${{ steps.docker_meta_frontend.outputs.tags }}
        labels: ${{ steps.docker_meta_frontend.outputs.labels }}

    - name: Build and Push Backend
      uses: docker/build-push-action@v2
      with:
        file: cmd/frontend/Dockerfile
        platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64
        push: true
        tags: ${{ steps.docker_meta_backend.outputs.tags }}
        labels: ${{ steps.docker_meta_backend.outputs.labels }}
